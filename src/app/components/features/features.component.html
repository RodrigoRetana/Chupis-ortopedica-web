<section class="features">
  <div class="features__bg"></div>
  <div class="container features__inner">
    <div class="features__header">
      <span class="section-label-light">¿Por qué elegirnos?</span>
      <h2>¡Somos especialistas!</h2>
    </div>
    <div class="features__grid">
      <div class="features__card" *ngFor="let f of features">
        <div class="features__icon" [innerHTML]="f.icon"></div>
        <h4>{{ f.title }}</h4>
        <p>{{ f.desc }}</p>
      </div>
    </div>
    <div class="features__cta">
      <a href="https://api.whatsapp.com/send?phone=+50662497452&text=Me+gustar%C3%ADa+m%C3%A1s+informaci%C3%B3n" target="_blank" class="btn btn-outline-light">Escríbanos por WhatsApp</a>
    </div>
  </div>
</section>
