<section class="page-hero">
  <div class="container">
    <h1>Contáctenos</h1>
    <p>Estamos para ayudarle</p>
  </div>
</section>
<section class="contacto-content">
  <div class="container contacto-inner">
    <div class="contacto-info">
      <span class="section-label">Información de contacto</span>
      <h2>Estamos a su <span>disposición</span></h2>
      <div class="contacto-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        <div>
          <strong>Teléfonos</strong>
          <p><a href="tel:+506-2231-4096">+(506) 2231-4096</a></p>
          <p><a href="tel:+506-2232-5835">+(506) 2232-5835</a></p>
        </div>
      </div>
      <div class="contacto-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
        <div>
          <strong>Correo electrónico</strong>
          <p><a href="mailto:chupisproformas@gmail.com">chupisproformas&#64;gmail.com</a></p>
        </div>
      </div>
      <div class="contacto-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-whatsapp"
          viewBox="0 0 16 16">
          <path
            d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232" />
        </svg>
        <div>
          <strong>WhatsApp</strong>
          <p><a href="https://api.whatsapp.com/send?phone=+50662497452" target="_blank">+(506) 62497-452</a></p>
        </div>
      </div>
    </div>

    <div class="contacto-form-wrap">
      <form class="contacto-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <h3>Envíenos un mensaje</h3>
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="form.nombre" required placeholder="Su nombre" />
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" [(ngModel)]="form.email" required placeholder="su@correo.com" />
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" [(ngModel)]="form.telefono" placeholder="+(506) ..." />
        </div>
        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" [(ngModel)]="form.mensaje" required
            placeholder="Escríbanos su consulta..." rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="sent">
          {{ sent ? '¡Mensaje enviado!' : 'Enviar mensaje' }}
        </button>
      </form>
    </div>
  </div>
</section>
